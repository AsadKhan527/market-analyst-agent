# One config file per client — this is the "productized template" mechanism.
# To sell to a new client, copy this file, change the values, run main.py --config <file>.
#
# competitors: each needs a name and a list of seed URLs (homepage, /pricing page, etc.)
# for the agent to research from. No live search API is used (see app/tools/search.py),
# so these URLs are how the agent knows where to look — plus it will also try a couple
# of predictable review-site URL guesses automatically.

business_name: "Brew & Bean Coffee Co."
competitors:
  - name: "Blue Bottle Coffee"
    urls:
      - "https://bluebottlecoffee.com"
  - name: "Stumptown Coffee Roasters"
    urls:
      - "https://www.stumptowncoffee.com"
  - name: "Counter Culture Coffee"
    urls:
      - "https://counterculturecoffee.com"

brand_color: "#6F4E37"
output_filename: "brew_and_bean_competitor_report.pdf"
